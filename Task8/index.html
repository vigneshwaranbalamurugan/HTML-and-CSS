<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Accordion Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="accordion">

            <div class="question">
                <input type="radio" id="question1" name="accordion" checked>
                <label for="question1">What is React?</label>
                <div class="answer">
                    React is a JavaScript library for building user interfaces.
                </div>
            </div>

            <div class="question">
                <input type="radio" id="question2" name="accordion">
                <label for="question2">What is Spring?</label>
                <div class="answer">
                    Spring is a powerful Java framework for backend development.
                </div>
            </div>

            <div class="question">
                <input type="radio" id="question3" name="accordion">
                <label for="question3">What is Vite?</label>
                <div class="answer">
                    Vite is a fast frontend build tool.
                </div>
            </div>

        </div>
    </main>
</body>

</html>

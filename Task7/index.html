<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <input type="radio" name="carousel" id="slide1" checked>
        <input type="radio" name="carousel" id="slide2">
        <input type="radio" name="carousel" id="slide3">

        <div class="Carousel">
            <img src="assets/css.png" alt="CSS" id="css">
            <img src="assets/spring.png" alt="Spring" id="spring">
            <img src="assets/vite.jpeg" alt="Vite" id="vite">
        </div>
        <div class="labels">
            <label for="slide1" class="nav"></label>
            <label for="slide2" class="nav"></label>
            <label for="slide3" class="nav"></label>
        </div>
        
    </main>
</body>

</html>

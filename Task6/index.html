<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabbed Content Interface</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <input type="radio" id="homebtn" name="tab" checked>
        <label for="homebtn">Home</label>
        <input type="radio" id="aboutbtn" name="tab">
        <label for="aboutbtn">About</label>
        <input type="radio" id="contactbtn" name="tab">
        <label for="contactbtn">Contact</label>
        <div id="home" class="home">
            <h2>Home</h2>
            <p>Welcome to the home page!</p>
        </div>
        <div id="about" class="about">
            <h2>About</h2>
            <p>This is the about page.</p>
        </div>
        <div id="contact" class="contact">
            <h2>Contact</h2>
            <p>Get in touch with us!</p>
        </div>
    </main>
</body>

</html>
